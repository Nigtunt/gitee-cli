name: Build and Release gitee-cli

on:
  push:
    branches: [ "main", "master" ]
  # 也可以支持手动触发流水线，测试时非常方便
  workflow_dispatch: 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            executable: gitee
            target_ext: ''
          - os: ubuntu-24.04-arm
            arch: arm64
            executable: gitee
            target_ext: ''
          - os: windows-latest
            arch: amd64
            executable: gitee.exe
            target_ext: '.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      # 👇 1. Windows 和 Linux x86 依然走正常的高速通道
      - name: ☕ 设置 GraalVM 21 (仅限 x86 和 Windows)
        if: matrix.os != 'ubuntu-24.04-arm'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'

      - name: 🔨 常规编译 (仅限 x86 和 Windows)
        if: matrix.os != 'ubuntu-24.04-arm'
        env:
          JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
        run: mvn clean package -Pnative

     # 👇 2. ARM64 专属编译通道：拉起 glibc 2.28 容器，并手动注入最新版 Maven
      - name: 🔨 ARM64 时光机编译 (降维至 glibc 2.28)
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          docker run --rm --entrypoint bash -v ${{ github.workspace }}:/app -w /app \
          ghcr.io/graalvm/native-image-community:21-ol8 \
          -c "microdnf install -y tar gzip && curl -sL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz -C /opt && export JAVA_TOOL_OPTIONS='-Dfile.encoding=UTF-8' && /opt/apache-maven-3.9.6/bin/mvn clean package -Pnative && chmod -R 777 target"

      # 👇 3. 统一重命名并上传 (所有架构共用)
      - name: 📦 重命名产物并准备上传
        run: |
          mv target/${{ matrix.executable }} target/gitee-cli-${{ runner.os }}-${{ matrix.arch }}${{ matrix.target_ext }}
        shell: bash

      - name: 🚀 上传编译好的二进制文件
        uses: actions/upload-artifact@v4
        with:
          name: gitee-cli-${{ runner.os }}-${{ matrix.arch }}
          path: target/gitee-cli-*
          retention-days: 7